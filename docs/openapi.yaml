openapi: 3.0.0
info:
  title: 'REST API for phpMyFAQ 4.2'
  description: 'phpMyFAQ includes a REST API and offers APIs for various services like fetching the phpMyFAQ version or doing a search against the phpMyFAQ installation.'
  contact:
    name: 'phpMyFAQ Team'
    email: support@phpmyfaq.de
  license:
    name: 'Mozilla Public Licence 2.0'
    url: 'https://www.mozilla.org/MPL/2.0/'
  version: '4.0'
servers:
  - url: 'https://localhost'
    description: 'Local dockerized server'
paths:
  '/api/v4.0/attachments/{faqId}':
    get:
      tags:
        - 'Public Endpoints'
      description: 'Returns a paginated list of attachments for a given FAQ record ID with optional sorting.'
      operationId: getAttachments
      parameters:
        - name: faqId
          in: path
          description: 'The FAQ record ID.'
          required: true
          schema:
            type: integer
        - name: page
          in: query
          description: 'Page number for pagination (1-indexed)'
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          description: 'Number of items per page'
          required: false
          schema:
            type: integer
            default: 25
            maximum: 100
            minimum: 1
        - name: limit
          in: query
          description: 'Alternative to per_page for offset-based pagination'
          required: false
          schema:
            type: integer
            default: 25
            maximum: 100
            minimum: 1
        - name: offset
          in: query
          description: 'Offset for pagination (overrides page parameter)'
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: sort
          in: query
          description: 'Field to sort by'
          required: false
          schema:
            type: string
            enum:
              - id
              - filename
              - mime_type
              - filesize
              - created
        - name: order
          in: query
          description: 'Sort order'
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
      responses:
        '200':
          description: 'Paginated list of attachments with metadata.'
          headers:
            Accept-Language:
              description: 'The language code for the attachment.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example:
                success: true
                data:
                  - { filename: attachment-1.pdf, url: 'https://www.example.org/attachment/1' }
                  - { filename: attachment-2.pdf, url: 'https://www.example.org/attachment/2' }
                meta:
                  pagination:
                    {
                      total: 2,
                      count: 2,
                      per_page: 25,
                      current_page: 1,
                      total_pages: 1,
                      offset: 0,
                      has_more: false,
                      has_previous: false,
                      links:
                        {
                          first: '/api/v4.0/attachments/1?page=1&per_page=25',
                          last: '/api/v4.0/attachments/1?page=1&per_page=25',
                          prev: null,
                          next: null,
                        },
                    }
                  sorting: { field: filename, order: asc }
        '500':
          description: 'If the attachments cannot be fetched.'
          headers:
            Accept-Language:
              description: 'The language code for the attachment.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example:
                success: false
                error:
                  code: ATTACHMENT_ERROR
                  message: 'Failed to fetch attachments'
  '/api/v4.0/backup/{type}':
    get:
      tags:
        - 'Endpoints with Authentication'
      operationId: createBackup
      parameters:
        - name: type
          in: path
          description: 'The backup type. Can be "data", "logs" or "content".'
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 'The current backup as a file or a ZipArchive in case of "content"-type.'
          headers:
            Accept-Language:
              description: 'The language code for the login.'
              schema:
                type: string
            x-pmf-token:
              description: 'phpMyFAQ client API Token, generated in admin backend'
              schema:
                type: string
          content:
            'application/octet-stream or application/zip':
              schema:
                type: string
        '400':
          description: 'If the backup type is wrong or an internal error occurred'
          headers:
            Accept-Language:
              description: 'The language code for the login.'
              schema:
                type: string
            x-pmf-token:
              description: 'phpMyFAQ client API Token, generated in admin backend'
              schema:
                type: string
          content:
            application/octet-stream:
              schema:
                type: string
        '401':
          description: 'If the user is not authenticated and/or does not have sufficient permissions.'
          headers:
            Accept-Language:
              description: 'The language code for the login.'
              schema:
                type: string
            x-pmf-token:
              description: 'phpMyFAQ client API Token, generated in admin backend'
              schema:
                type: string
  /api/v4.0/categories:
    get:
      tags:
        - 'Public Endpoints'
      operationId: getCategories
      parameters:
        - name: page
          in: query
          description: 'Page number for pagination (page-based)'
          required: false
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: 'Items per page (page-based, max 100)'
          required: false
          schema:
            type: integer
            default: 25
        - name: limit
          in: query
          description: 'Number of items to return (offset-based, max 100)'
          required: false
          schema:
            type: integer
            default: 25
        - name: offset
          in: query
          description: 'Starting offset (offset-based)'
          required: false
          schema:
            type: integer
            default: 0
        - name: sort
          in: query
          description: 'Field to sort by'
          required: false
          schema:
            type: string
            default: id
            enum:
              - id
              - name
              - parent_id
              - active
        - name: order
          in: query
          description: 'Sort direction'
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
      responses:
        '200':
          description: 'Returns paginated categories for the given language provided by "Accept-Language".'
          headers:
            Accept-Language:
              description: 'The language code for the categories.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example:
                success: true
                data:
                  - {
                      id: 1,
                      lang: en,
                      parent_id: 0,
                      name: Test,
                      description: 'Hello, World! Hello, Tests!',
                      user_id: 1,
                      group_id: 1,
                      active: 1,
                      show_home: 1,
                      image: category-1-en.png,
                      level: 1,
                    }
                meta:
                  pagination:
                    {
                      total: 50,
                      count: 25,
                      per_page: 25,
                      current_page: 1,
                      total_pages: 2,
                      links:
                        {
                          first: '/api/v4.0/categories?page=1&per_page=25',
                          last: '/api/v4.0/categories?page=2&per_page=25',
                          prev: null,
                          next: '/api/v4.0/categories?page=2&per_page=25',
                        },
                    }
                  sorting: { field: id, order: asc }
  /api/v4.0/category:
    post:
      tags:
        - 'Endpoints with Authentication'
      operationId: createCategory
      requestBody:
        description: 'The parent category ID is a required value, the parent category name is optional. If the parent category name is present and the ID can be mapped, the parent category ID from the name will be used. If the parent category name cannot be mapped, a 409 error is thrown'
        required: true
        content:
          application/json:
            schema:
              required:
                - language
                - parent-id
                - parent-category-name
                - category-name
                - description
                - user-id
                - group-id
                - is-active
                - show-on-homepage
              properties:
                language:
                  type: string
                parent-id:
                  type: integer
                parent-category-name:
                  type: string
                category-name:
                  type: string
                description:
                  type: string
                user-id:
                  type: integer
                group-id:
                  type: integer
                is-active:
                  type: boolean
                show-on-homepage:
                  type: boolean
              type: object
            example: "{\n                \"language\": \"en\",\n                \"parent-id\": 1,\n                \"parent-category-name\": \"Test\",\n                \"category-name\": \"Test 2\",\n                \"description\": \"Hello, World! Hello, Tests!\",\n                \"user-id\": 1,\n                \"group-id\": 1,\n                \"is-active\": true,\n                \"show-on-homepage\": true\n            }"
      responses:
        '201':
          description: 'If all posted data is correct.'
          headers:
            Accept-Language:
              description: 'The language code for the login.'
              schema:
                type: string
            x-pmf-token:
              description: 'phpMyFAQ client API Token, generated in admin backend'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example:
                stored: true
        '400':
          description: "If something didn't worked out."
          headers:
            Accept-Language:
              description: 'The language code for the login.'
              schema:
                type: string
            x-pmf-token:
              description: 'phpMyFAQ client API Token, generated in admin backend'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example:
                stored: false
                error: 'Cannot add category'
        '409':
          description: 'If the parent category name cannot be mapped.'
          headers:
            Accept-Language:
              description: 'The language code for the login.'
              schema:
                type: string
            x-pmf-token:
              description: 'phpMyFAQ client API Token, generated in admin backend'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example:
                stored: false
                error: 'The given parent category name was not found.'
        '401':
          description: 'If the user is not authenticated.'
          headers:
            Accept-Language:
              description: 'The language code for the login.'
              schema:
                type: string
            x-pmf-token:
              description: 'phpMyFAQ client API Token, generated in admin backend'
              schema:
                type: string
  '/api/v4.0/comments/{faqId}':
    get:
      tags:
        - 'Public Endpoints'
      description: 'Returns a paginated list of comments for a given FAQ record ID.'
      operationId: getComments
      parameters:
        - name: faqId
          in: path
          description: 'The FAQ record ID.'
          required: true
          schema:
            type: integer
        - name: page
          in: query
          description: 'Page number for pagination (page-based)'
          required: false
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: 'Items per page (page-based, max 100)'
          required: false
          schema:
            type: integer
            default: 25
        - name: limit
          in: query
          description: 'Number of items to return (offset-based, max 100)'
          required: false
          schema:
            type: integer
            default: 25
        - name: offset
          in: query
          description: 'Starting offset (offset-based)'
          required: false
          schema:
            type: integer
            default: 0
        - name: sort
          in: query
          description: 'Field to sort by'
          required: false
          schema:
            type: string
            default: id_comment
            enum:
              - id_comment
              - id
              - usr
              - datum
        - name: order
          in: query
          description: 'Sort direction'
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
      responses:
        '200':
          description: 'Returns paginated comments for the FAQ.'
          headers:
            Accept-Language:
              description: 'The language code for the login.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example:
                success: true
                data:
                  - {
                      id: 2,
                      recordId: 142,
                      categoryId: null,
                      type: faq,
                      username: 'phpMyFAQ User',
                      comment: 'Foo! Bar?',
                      date: '2019-12-24T12:24:57+0100',
                      helped: null,
                    }
                meta:
                  pagination:
                    {
                      total: 50,
                      count: 25,
                      per_page: 25,
                      current_page: 1,
                      total_pages: 2,
                      links:
                        {
                          first: '/api/v4.0/comments/142?page=1&per_page=25',
                          last: '/api/v4.0/comments/142?page=2&per_page=25',
                          prev: null,
                          next: '/api/v4.0/comments/142?page=2&per_page=25',
                        },
                    }
                  sorting: { field: id_comment, order: asc }
  '/api/v4.0/faqs/{categoryId}':
    get:
      tags:
        - 'Public Endpoints'
      description: 'This endpoint returns all the FAQs with a preview of the answer for the given category ID and the language provided by "Accept-Language".'
      operationId: getByCategoryId
      parameters:
        - name: categoryId
          in: path
          description: 'The category ID.'
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 'If the category returns at least one FAQ.'
          headers:
            Accept-Language:
              description: 'The language code for the FAQ.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example:
                - record_id: 1
                  record_lang: en
                  category_id: 1
                  record_title: 'Is there life after death?'
                  record_preview: Maybe!
                  record_link: /phpmyfaq/content/1/1/en/is-there-life-after-death.html
                  record_updated: '20191010175452'
                  visits: 3
                  record_created: '2018-09-03T21:30:17+02:00'
        '500':
          description: 'If fetching the FAQs fails.'
          headers:
            Accept-Language:
              description: 'The language code for the FAQ.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example:
                error: 'Error message'
  '/api/v4.0/faq/{categoryId}/{faqId}':
    get:
      tags:
        - 'Public Endpoints'
      description: 'This endpoint returns the FAQ for the given FAQ ID and the language provided by "Accept-Language".'
      operationId: getFaqById
      parameters:
        - name: categoryId
          in: path
          description: 'The category ID.'
          required: true
          schema:
            type: integer
        - name: faqId
          in: path
          description: 'The FAQ ID.'
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 'If the FAQ exists.'
          headers:
            Accept-Language:
              description: 'The language code for the FAQ.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example:
                id: 1
                lang: en
                solution_id: 1000
                revision_id: 0
                active: 'yes'
                sticky: 0
                keywords: ''
                question: 'Is there life after death?'
                answer: Maybe!
                author: 'phpMyFAQ User'
                email: user@example.org
                comment: 'y'
                updated: '2019-10-10 17:54'
                dateStart: '00000000000000'
                dateEnd: '99991231235959'
                created: '2019-09-03T21:30:17+02:00'
                category_id: 1
                link: 'https://localhost/content/1/1/en/is_there_life_after_death.html'
        '404':
          description: 'If there are no FAQs for the given FAQ ID.'
          headers:
            Accept-Language:
              description: 'The language code for the FAQ.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example: {}
  '/api/v4.0/faqs/tags/{tagId}':
    get:
      tags:
        - 'Public Endpoints'
      description: "This endpoint returns all the FAQs for the given tag ID and the language provided by \n        \"Accept-Language\""
      operationId: getByTagId
      parameters:
        - name: tagId
          in: path
          description: 'The tag ID.'
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 'If the tag ID returns at least one FAQ.'
          headers:
            Accept-Language:
              description: 'The language code for the FAQ.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example:
                - record_id: 1
                  record_lang: en
                  category_id: 1
                  record_title: 'Is there life after death?'
                  record_preview: Maybe!
                  record_link: /phpmyfaq/content/1/1/en/is-there-life-after-death.html
                  record_updated: '20191010175452'
                  visits: 3
                  record_created: '2018-09-03T21:30:17+02:00'
        '500':
          description: 'If fetching the tagged FAQs fails.'
          headers:
            Accept-Language:
              description: 'The language code for the FAQ.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example:
                error: 'Error message'
  /api/v4.0/faqs/popular:
    get:
      tags:
        - 'Public Endpoints'
      description: 'This endpoint returns the popular FAQs for the given language provided by "Accept-Language".'
      operationId: getPopular
      responses:
        '200':
          description: "If there's at least one popular FAQ."
          headers:
            Accept-Language:
              description: 'The language code for the FAQ.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example:
                - date: '2019-07-13T11:28:00+0200'
                  question: 'How can I survive without phpMyFAQ?'
                  answer: 'A good question!'
                  visits: 10
                  url: 'https://www.example.org/content/1/36/de/how-can-i-survive-without-phpmyfaq.html'
        '404':
          description: "If there's not a single popular FAQ."
          headers:
            Accept-Language:
              description: 'The language code for the FAQ.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example: []
  v4.0/faqs/latest:
    get:
      tags:
        - 'Public Endpoints'
      description: 'This endpoint returns the latest FAQs for the given language provided by "Accept-Language".'
      operationId: getLatest
      responses:
        '200':
          description: "If there's at least one latest FAQ."
          headers:
            Accept-Language:
              description: 'The language code for the FAQ.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example:
                - date: '2019-07-13T11:28:00+0200'
                  question: 'How can I survive without phpMyFAQ?'
                  answer: 'A good question!'
                  visits: 10
                  url: 'https://www.example.org/content/1/36/de/how-can-i-survive-without-phpmyfaq.html'
        '404':
          description: "If there's not one latest FAQ."
          headers:
            Accept-Language:
              description: 'The language code for the FAQ.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example: []
  /api/v4.0/faqs/trending:
    get:
      tags:
        - 'Public Endpoints'
      description: 'This endpoint returns the trending FAQs for the given language provided by "Accept-Language".'
      operationId: getTrending
      responses:
        '200':
          description: "If there's at least one trending FAQ."
          headers:
            Accept-Language:
              description: 'The language code for the FAQ.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example:
                - date: '2019-07-13T11:28:00+0200'
                  question: 'How can I survive without phpMyFAQ?'
                  answer: 'A good question!'
                  visits: 10
                  url: 'https://www.example.org/content/1/36/de/how-can-i-survive-without-phpmyfaq.html'
        '404':
          description: "If there's not a single trending FAQ."
          headers:
            Accept-Language:
              description: 'The language code for the FAQ.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example: []
  /api/v4.0/faqs/sticky:
    get:
      tags:
        - 'Public Endpoints'
      description: 'This endpoint returns the sticky FAQs for the given language provided by "Accept-Language".'
      operationId: getSticky
      responses:
        '200':
          description: "If there's at least one sticky FAQ."
          headers:
            Accept-Language:
              description: 'The language code for the FAQ.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example:
                - question: 'How can I survive without phpMyFAQ?'
                  url: 'https://www.example.org/content/1/36/de/how-can-i-survive-without-phpmyfaq.html'
                  id: 8
                  order: 1
                - question: 'Is there life after death?'
                  url: 'https://www.example.org/content/1/1/de/is-there-life-after-death.html'
                  id: 10
                  order: 2
        '404':
          description: "If there's not one sticky FAQ."
          headers:
            Accept-Language:
              description: 'The language code for the FAQ.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example: []
  /api/v4.0/faqs:
    get:
      tags:
        - 'Public Endpoints'
      description: 'This endpoint returns paginated FAQs for the given language provided by "Accept-Language".'
      operationId: getAll
      parameters:
        - name: page
          in: query
          description: 'Page number for pagination (page-based)'
          required: false
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: 'Items per page (page-based, max 100)'
          required: false
          schema:
            type: integer
            default: 25
        - name: limit
          in: query
          description: 'Number of items to return (offset-based, max 100)'
          required: false
          schema:
            type: integer
            default: 25
        - name: offset
          in: query
          description: 'Starting offset (offset-based)'
          required: false
          schema:
            type: integer
            default: 0
        - name: sort
          in: query
          description: 'Field to sort by'
          required: false
          schema:
            type: string
            default: id
            enum:
              - id
              - title
              - author
              - updated
              - created
        - name: order
          in: query
          description: 'Sort direction'
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
      responses:
        '200':
          description: 'Returns paginated FAQs.'
          headers:
            Accept-Language:
              description: 'The language code for the FAQ.'
              schema:
                type: string
          content:
            application/json:
              schema: {}
              example:
                success: true
                data:
                  - {
                      id: '1',
                      lang: en,
                      solution_id: '1000',
                      revision_id: '0',
                      active: 'yes',
                      sticky: '0',
                      keywords: '',
                      title: 'Is there life after death?',
                      content: Maybe!,
                      author: 'phpMyFAQ User',
                      email: user@example.org,
                      comment: 'y',
                      updated: '2009-10-10 17:54:00',
                      dateStart: '00000000000000',
                      dateEnd: '99991231235959',
                      created: '2008-09-03T21:30:17+02:00',
                      notes: '',
                    }
                meta:
                  pagination:
                    {
                      total: 50,
                      count: 25,
                      per_page: 25,
                      current_page: 1,
                      total_pages: 2,
                      links:
                        {
                          first: '/api/v4.0/faqs?page=1&per_page=25',
                          last: '/api/v4.0/faqs?page=2&per_page=25',
                          prev: null,
                          next: '/api/v4.0/faqs?page=2&per_page=25',
                        },
                    }
                  sorting: { field: id, order: asc }
  /api/v4.0/faq/create:
    post:
      tags:
        - 'Endpoints with Authentication'
      operationId: createFaq
      requestBody:
        description: 'The category ID is a required value, the category name is optional. If the category name is present and the ID can be mapped, the category ID from the name will be used. If the category name cannot be mapped, a 409 error is thrown.'
        required: true
        content:
          application/json:
            schema:
              required:
                - language
                - category-id
                - category-name
                - question
                - answer
                - keywords
                - author
                - email
                - is-active
                - is-sticky
              properties:
                language:
                  type: string
                category-id:
                  type: integer
                category-name:
                  type: string
                question:
                  type: string
                answer:
                  type: string
                keywords:
                  type: string
                author:
                  type: string
                email:
                  type: string
                is-active:
                  type: boolean
                is-sticky:
                  type: boolean
              type: object
